name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Builds (cross-compiling where needed), packages, and uploads the `shap`
      # binary to the GitHub release for the pushed tag.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: shap
          target: ${{ matrix.target }}
          archive: shap-$tag-${{ matrix.target }}
          profile: dist
          token: ${{ secrets.GITHUB_TOKEN }}
